services:
  - type: web
    name: contentflow-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npx tsx server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: contentflow-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://marketing.dakyworld.com,https://daky0000.github.io

databases:
  - name: contentflow-db
    plan: free
